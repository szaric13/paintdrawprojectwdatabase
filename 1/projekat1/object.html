<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Metropolitan Museum of Art</title>
    <link rel="stylesheet" href="css/style.css">
     <link rel="icon" href="muzejikona.png">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="index.html">
            <img src="muzejikona.png" width="30" height="30" alt="Museum">
            Metropolitan Museum
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        Departments
                    </a>
                    <div class="dropdown-menu" aria-labelledby="navbarDropdown" id="departmentMenu">
                    </div>
                </li>
            </ul>
            <form class="form-inline my-2 my-lg-0" id="searchForm">
                <input class="form-control mr-sm-2" type="search" placeholder="Type to search" id="searchInput" aria-label="Search">
                <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
            </form>
        </div>
    </nav>
    

    
    
    <div class="container mt-4">
        <h1 id="objectTitle">Object Title</h1>
        <img id="objectImage" src="" alt="Object Image" class="img-fluid mb-4" width="400" height="400">
        <p><strong>Artist:</strong> <span id="objectArtist"></span></p>
        <p><strong>Date:</strong> <span id="objectDate"></span></p>
        <p><strong>Medium:</strong> <span id="objectMedium"></span></p>
        <p><strong>Dimensions:</strong> <span id="objectDimensions"></span></p>
        <p id="objectDescription"></p>
    </div>
    
    <script>
        
        
    </script>
     <ul class="navbar-nav mr-auto" id="departmentMenu"></ul>
     <script src="js/search.js"></script>
     <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
     <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
     <script src="js/main.js"></script>
     <script src="js/search.js"></script>
     <script src="js/department.js"></script>
     <script src="js/objects.js"></script>
</body>
</html>
